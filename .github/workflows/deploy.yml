name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    name: Deploy to Cloudflare Pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.12'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Check Cloudflare credentials
        id: check-credentials
        run: |
          TOKEN_TRIMMED="${CLOUDFLARE_API_TOKEN//[[:space:]]/}"
          ACCOUNT_ID_TRIMMED="${CLOUDFLARE_ACCOUNT_ID//[[:space:]]/}"
          if [[ -n "$TOKEN_TRIMMED" && -n "$ACCOUNT_ID_TRIMMED" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::CLOUDFLARE_API_TOKEN or CLOUDFLARE_ACCOUNT_ID secret is not configured. Skipping Cloudflare Pages deployment."
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Publish to Cloudflare Pages
        if: steps.check-credentials.outputs.available == 'true'
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: trade-m8-production
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          wranglerVersion: '3'

      - name: Health Check
        if: steps.check-credentials.outputs.available == 'true' && github.ref == 'refs/heads/main'
        run: |
          echo "Waiting for deployment to propagate..."
          sleep 30
          curl -f https://trade-m8.app/api/health || echo "Health check failed, but deployment may still be propagating"
